<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Tennis Match Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg: #0F2B22;
    --surface: #163B2C;
    --surface-2: #1C4736;
    --line: #2C5443;
    --ball: #D9F25D;
    --ball-dim: #B8D43E;
    --clay: #E0703A;
    --text: #F4F7EE;
    --text-muted: #93AC9C;
    --danger: #E2614F;
    --silver: #9FB6A8;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0;
    padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    overscroll-behavior-y: none;
  }

  body{ min-height: 100vh; position: relative; }

  .court-bg{ position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .wrap{
    position: relative;
    z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: 36px 20px 60px;
  }

  /* ---------- Header / Title ---------- */
  .title-wrap{ position: relative; margin-bottom: 30px; }

  h1.headline{
    font-family: 'Anton', sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    font-size: 2.45rem;
    line-height: 0.98;
    letter-spacing: 0.5px;
    margin: 0;
  }
  h1.headline .line2{ color: var(--ball); display:block; }

  .signature{
    position: absolute;
    top: 32px;
    left: 60%;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--clay);
    transform: rotate(-10deg);
    transform-origin: left top;
    white-space: nowrap;
    pointer-events: none;
  }
  .signature span{ display: inline-block; animation: sig-bounce 1.4s ease-in-out infinite; }
  @keyframes sig-bounce{
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(0.74) translateY(2px); }
  }

  /* ---------- Section shells ---------- */
  .section{ margin-bottom: 30px; }
  .eyebrow{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .eyebrow .count{ color: var(--ball); font-family: 'Manrope', sans-serif; }

  /* ---------- Segmented control ---------- */
  .segmented{
    display:flex;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
    transition: opacity 0.2s ease;
  }
  .segmented button{
    flex: 1;
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 0.92rem;
    padding: 12px 8px;
    border-radius: 10px;
    transition: background 0.18s ease, color 0.18s ease, transform 0.12s ease;
  }
  .segmented button.active{
    background: var(--ball);
    color: #14271C;
    box-shadow: 0 4px 14px rgba(217,242,93,0.18);
  }
  .segmented button:active{ transform: scale(0.96); }
  .segmented.format button.active.fixed-active{
    background: var(--clay);
    color: #2A140C;
    box-shadow: 0 4px 14px rgba(224,112,58,0.22);
  }

  .hint{ margin-top: 8px; font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }

  .disabled-zone{ opacity: 0.4; pointer-events: none; }

  /* ---------- Players ---------- */
  .player-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 8px;
    transition: opacity 0.2s ease;
  }
  .player-row{
    display:flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    border-bottom: 1px solid var(--line);
  }
  .player-row:last-of-type{ border-bottom: none; }
  .player-row.enter{ animation: row-in 0.32s ease; }
  @keyframes row-in{
    from{ opacity: 0; transform: translateY(-10px) scaleY(0.85); }
    to{ opacity: 1; transform: translateY(0) scaleY(1); }
  }
  .badge{
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--ball);
    color: #14271C;
    font-weight: 800;
    font-size: 0.78rem;
    display:flex; align-items:center; justify-content:center;
  }
  .player-name{
    flex: 1;
    font-weight: 700;
    font-size: 0.96rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .remove-btn{
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 8px;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .remove-btn:active{ color: var(--danger); background: rgba(226,97,79,0.12); }

  .composer{ display:flex; gap: 8px; padding: 8px; }
  .composer.team-composer{ flex-direction: column; }
  .team-composer .name-row{ display:flex; gap: 8px; }
  .team-composer .add-btn{ width: 100%; }
  .composer input{
    flex: 1;
    min-width: 0;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 13px 14px;
  }
  .composer input::placeholder{ color: var(--text-muted); font-weight: 500; }
  .composer input:focus{ outline: none; border-color: var(--ball); }

  .add-btn{
    flex-shrink: 0;
    background: var(--ball);
    color: #14271C;
    border: none;
    border-radius: 12px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 0.92rem;
    padding: 0 18px;
    transition: transform 0.12s ease, background 0.15s ease;
  }
  .add-btn:active{ transform: scale(0.96); background: var(--ball-dim); }
  .add-btn:disabled{ opacity: 0.45; }

  /* ---------- Generate CTA ---------- */
  .generate-btn{
    width: 100%;
    background: var(--ball);
    color: #14271C;
    border: none;
    border-radius: 16px;
    font-family: 'Anton', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 1.1rem;
    padding: 17px 0;
    box-shadow: 0 10px 24px rgba(217,242,93,0.16);
    transition: transform 0.12s ease, background 0.15s ease;
  }
  .generate-btn:active{ transform: scale(0.98); }
  .generate-btn:disabled{ opacity: 0.4; box-shadow: none; }

  .warn{ margin-top: 10px; font-size: 0.82rem; color: var(--clay); text-align: center; font-weight: 700; }

  /* ---------- Results / Rounds ---------- */
  .results{ margin-top: 34px; }
  .round-group{ margin-bottom: 22px; }
  .round-title{
    font-family: 'Anton', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .court-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .court-label{
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--ball);
    margin-bottom: 12px;
  }
  .matchup{ display:flex; align-items: center; gap: 10px; }
  .team-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .team-name{ font-weight: 700; font-size: 0.92rem; line-height: 1.3; text-align:center; }
  .vs{ font-family: 'Anton', sans-serif; color: var(--text-muted); font-size: 0.85rem; flex-shrink:0; }

  .score-input{
    width: 58px;
    text-align: center;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 8px 0;
  }
  .score-input:focus{ outline: none; border-color: var(--ball); }
  .score-input::placeholder{ color: var(--text-muted); }

  .sitting{ margin-top: 4px; font-size: 0.8rem; color: var(--text-muted); text-align: center; }

  .preview-actions{ display:flex; gap: 10px; margin-top: 6px; }
  .btn-outline{
    flex:1;
    background: transparent;
    border: 1.5px solid var(--ball);
    color: var(--ball);
    border-radius: 14px;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 13px 0;
    font-family: 'Manrope', sans-serif;
  }
  .btn-outline:active{ transform: scale(0.98); }
  .btn-solid{
    flex:1;
    background: var(--ball);
    color: #14271C;
    border: none;
    border-radius: 14px;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 13px 0;
    font-family: 'Manrope', sans-serif;
  }
  .btn-solid:active{ transform: scale(0.98); }

  .view-leaderboard-btn{ margin-top: 4px; }

  /* ---------- Leaderboard ---------- */
  .back-link{
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-weight: 700;
    font-size: 0.85rem;
    padding: 8px 0;
    margin-bottom: 14px;
  }
  .leaderboard-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 18px;
  }
  .lb-header{ text-align: center; margin-bottom: 18px; }
  .lb-eyebrow{
    font-size: 0.7rem;
    letter-spacing: 1.6px;
    color: var(--ball);
    font-weight: 800;
    text-transform: uppercase;
  }
  .lb-header h2{
    font-family: 'Anton', sans-serif;
    font-size: 1.6rem;
    margin: 4px 0 0;
    text-transform: uppercase;
  }
  .leaderboard-row{ display:flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--line); }
  .leaderboard-row:last-child{ border-bottom: none; }
  .lb-rank{
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--text-muted);
    font-weight: 800;
    font-size: 0.85rem;
    display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
  }
  .leaderboard-row.rank-1 .lb-rank{ background: var(--ball); color:#14271C; }
  .leaderboard-row.rank-2 .lb-rank{ background: var(--silver); color:#14271C; }
  .leaderboard-row.rank-3 .lb-rank{ background: var(--clay); color:#2A140C; }
  .lb-name{ flex: 1; min-width: 0; }
  .lb-name .nm{ font-weight: 800; font-size: 0.96rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-name .meta{ font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; }
  .lb-points{ font-family: 'Anton', sans-serif; font-size: 1.2rem; color: var(--ball); text-align: right; flex-shrink:0; }
  .lb-points .unit{ font-family: 'Manrope', sans-serif; font-size: 0.62rem; color: var(--text-muted); margin-left: 2px; }

  .leaderboard-actions{ display:flex; flex-direction: column; gap: 10px; margin-top: 18px; }
  .btn-reset{
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--clay);
    color: var(--clay);
    border-radius: 14px;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 13px 0;
    font-family: 'Manrope', sans-serif;
  }
</style>
</head>
<body>

<svg class="court-bg" viewBox="0 0 400 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#F4F7EE" stroke-opacity="0.035" stroke-width="2">
    <rect x="30" y="40" width="340" height="820"/>
    <line x1="30" y1="450" x2="370" y2="450"/>
    <line x1="200" y1="180" x2="200" y2="720"/>
    <rect x="60" y="180" width="280" height="540"/>
    <line x1="60" y1="450" x2="340" y2="450"/>
  </g>
</svg>

<div class="wrap">

  <div class="title-wrap" id="titleWrap">
    <h1 class="headline">Tennis <span id="wordMatch">Match</span><span class="line2">Generator</span></h1>
    <div class="signature" id="signature">by Guhnyuji</div>
  </div>

  <div class="section">
    <div class="eyebrow"><span>Match Type</span></div>
    <div class="segmented" id="gameTypeToggle">
      <button class="active" data-gametype="doubles">Doubles</button>
      <button data-gametype="singles">Singles</button>
    </div>
    <div class="hint" id="gameTypeHint">2v2 per court — pick a format below.</div>
  </div>

  <div class="section" id="formatSection">
    <div class="eyebrow"><span>Match Format</span></div>
    <div class="segmented format" id="formatToggle">
      <button class="active" data-format="random">All Random</button>
      <button data-format="fixed">Fixed Team</button>
    </div>
    <div class="hint" id="formatHint">Random partners &amp; opponents every round.</div>
  </div>

  <div class="section">
    <div class="eyebrow">
      <span id="playersLabel">Players</span>
      <span class="count" id="playerCount">0</span>
    </div>
    <div class="player-card" id="playerCard">
      <div id="playerList"></div>
      <div id="teamList" style="display:none;"></div>
      <div class="composer" id="playerComposer">
        <input type="text" id="playerInput" placeholder="Enter player name" maxlength="24">
        <button class="add-btn" id="addBtn">Add Player</button>
      </div>
      <div class="composer team-composer" id="teamComposer" style="display:none;">
        <div class="name-row">
          <input type="text" id="teamP1Input" placeholder="Player 1" maxlength="24">
          <input type="text" id="teamP2Input" placeholder="Player 2" maxlength="24">
        </div>
        <button class="add-btn" id="addTeamBtn">Add Team</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="eyebrow"><span>Courts</span></div>
    <div class="segmented" id="courtToggle">
      <button data-courts="1">1</button>
      <button class="active" data-courts="2">2</button>
      <button data-courts="3">3</button>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn">Generate Matchups</button>
  <div class="warn" id="warnText" style="display:none;"></div>

  <div class="results" id="results" style="display:none;">

    <div id="roundsContainer"></div>

    <div class="preview-actions" id="previewActions" style="display:none;">
      <button class="btn-outline" id="shuffleBtn">Shuffle Again</button>
      <button class="btn-solid" id="confirmBtn">Confirm Matchups</button>
    </div>

    <button class="generate-btn view-leaderboard-btn" id="viewLeaderboardBtn" style="display:none;">View Leaderboard</button>

    <div id="leaderboardSection" style="display:none;">
      <button class="back-link" id="backToMatchesBtn">&lsaquo; Back to matches</button>
      <div class="leaderboard-card" id="leaderboardCard">
        <div class="lb-header">
          <div class="lb-eyebrow">Final Standings</div>
          <h2>Tennis Match Generator</h2>
        </div>
        <div id="leaderboardList"></div>
      </div>
      <div class="leaderboard-actions">
        <button class="btn-solid" id="shareBtn">Save / Share Leaderboard</button>
        <button class="btn-reset" id="startOverBtn">Start New Matchups</button>
      </div>
    </div>

  </div>

</div>

<script>
  // ---------- Signature letter bounce ----------
  (function(){
    const sig = document.getElementById('signature');
    const text = sig.textContent;
    sig.innerHTML = '';
    [...text].forEach((ch, i) => {
      const s = document.createElement('span');
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      s.style.animationDelay = (i * 0.07) + 's';
      sig.appendChild(s);
    });
  })();

  // ---------- Signature placement: tuck it right under the H in "Match" ----------
  function positionSignature(){
    const titleWrap = document.getElementById('titleWrap');
    const wordMatch = document.getElementById('wordMatch');
    const sig = document.getElementById('signature');
    const titleRect = titleWrap.getBoundingClientRect();
    const matchRect = wordMatch.getBoundingClientRect();

    let left = (matchRect.right - titleRect.left) - sig.offsetWidth * 0.55;
    left = Math.max(0, Math.min(left, titleRect.width - sig.offsetWidth * 0.5));
    const top = (matchRect.bottom - titleRect.top) - 8;

    sig.style.left = left + 'px';
    sig.style.top = top + 'px';
  }
  window.addEventListener('load', positionSignature);
  window.addEventListener('resize', positionSignature);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(positionSignature); }
  positionSignature();

  // ---------- State ----------
  let players = [];
  let teams = [];        // Fixed Team roster: {id, players:[{id,name},{id,name}]}
  let gameType = 'doubles'; // 'doubles' | 'singles'
  let format = 'random';
  let courts = 2;
  let schedule = null;   // array of rounds: {courts:[[teamAplayers, teamBplayers], ...], sitting:[players]}
  let scores = null;     // mirrors schedule shape: [round][court] = {a:null,b:null}
  let locked = false;
  let showingLeaderboard = false;

  const playerList = document.getElementById('playerList');
  const playerInput = document.getElementById('playerInput');
  const playerCount = document.getElementById('playerCount');
  const addBtn = document.getElementById('addBtn');
  const playerCard = document.getElementById('playerCard');
  const playersLabel = document.getElementById('playersLabel');
  const playerComposer = document.getElementById('playerComposer');

  const teamList = document.getElementById('teamList');
  const teamComposer = document.getElementById('teamComposer');
  const teamP1Input = document.getElementById('teamP1Input');
  const teamP2Input = document.getElementById('teamP2Input');
  const addTeamBtn = document.getElementById('addTeamBtn');

  const gameTypeToggle = document.getElementById('gameTypeToggle');
  const gameTypeHint = document.getElementById('gameTypeHint');
  const formatSection = document.getElementById('formatSection');
  const formatToggle = document.getElementById('formatToggle');
  const formatHint = document.getElementById('formatHint');
  const courtToggle = document.getElementById('courtToggle');

  const generateBtn = document.getElementById('generateBtn');
  const warnText = document.getElementById('warnText');
  const resultsEl = document.getElementById('results');
  const roundsContainer = document.getElementById('roundsContainer');
  const previewActions = document.getElementById('previewActions');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const confirmBtn = document.getElementById('confirmBtn');
  const viewLeaderboardBtn = document.getElementById('viewLeaderboardBtn');
  const leaderboardSection = document.getElementById('leaderboardSection');
  const backToMatchesBtn = document.getElementById('backToMatchesBtn');
  const leaderboardList = document.getElementById('leaderboardList');
  const shareBtn = document.getElementById('shareBtn');
  const startOverBtn = document.getElementById('startOverBtn');

  // ---------- Players ----------
  function renderPlayers(justAddedId){
    playerList.innerHTML = '';
    players.forEach((p, idx) => {
      const row = document.createElement('div');
      row.className = 'player-row' + (p.id === justAddedId ? ' enter' : '');
      row.innerHTML = `
        <div class="badge">${idx + 1}</div>
        <div class="player-name">${p.name}</div>
        <button class="remove-btn" data-id="${p.id}">&times;</button>
      `;
      playerList.appendChild(row);
    });
    playerCount.textContent = players.length;
  }

  function addPlayer(){
    const name = playerInput.value.trim();
    if(!name) return;
    const id = Date.now() + Math.random();
    players.push({ id, name });
    playerInput.value = '';
    renderPlayers(id);
    playerInput.focus();
  }

  addBtn.addEventListener('click', addPlayer);
  playerInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); addPlayer(); }
  });
  playerList.addEventListener('click', (e) => {
    const btn = e.target.closest('.remove-btn');
    if(!btn) return;
    players = players.filter(p => String(p.id) !== String(btn.dataset.id));
    renderPlayers(null);
  });

  // ---------- Teams (Fixed Team mode) ----------
  function renderTeams(justAddedId){
    teamList.innerHTML = '';
    teams.forEach((t, idx) => {
      const row = document.createElement('div');
      row.className = 'player-row' + (t.id === justAddedId ? ' enter' : '');
      row.innerHTML = `
        <div class="badge">${idx + 1}</div>
        <div class="player-name">${t.players[0].name} &amp; ${t.players[1].name}</div>
        <button class="remove-btn" data-team-id="${t.id}">&times;</button>
      `;
      teamList.appendChild(row);
    });
    playerCount.textContent = teams.length;
  }

  function addTeam(){
    const n1 = teamP1Input.value.trim();
    const n2 = teamP2Input.value.trim();
    if(!n1 || !n2) return;
    const id = 'team_' + Date.now() + '_' + Math.random();
    teams.push({ id, players: [{ id: id + '_a', name: n1 }, { id: id + '_b', name: n2 }] });
    teamP1Input.value = '';
    teamP2Input.value = '';
    renderTeams(id);
    teamP1Input.focus();
  }

  addTeamBtn.addEventListener('click', addTeam);
  teamP1Input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); teamP2Input.focus(); }
  });
  teamP2Input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); addTeam(); }
  });
  teamList.addEventListener('click', (e) => {
    const btn = e.target.closest('.remove-btn');
    if(!btn) return;
    teams = teams.filter(t => String(t.id) !== String(btn.dataset.teamId));
    renderTeams(null);
  });

  // ---------- Game Type / Format / Courts toggles ----------
  function updateRosterUI(){
    const showTeams = (gameType === 'doubles' && format === 'fixed');
    playerComposer.style.display = showTeams ? 'none' : 'flex';
    playerList.style.display = showTeams ? 'none' : 'block';
    teamComposer.style.display = showTeams ? 'flex' : 'none';
    teamList.style.display = showTeams ? 'block' : 'none';
    playersLabel.textContent = showTeams ? 'Teams' : 'Players';
    playerCount.textContent = showTeams ? teams.length : players.length;
  }

  function resetScheduleIfAny(){
    warnText.style.display = 'none';
    if(schedule){
      schedule = null; scores = null; locked = false; showingLeaderboard = false;
      refreshView();
    }
  }

  gameTypeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;
    gameType = btn.dataset.gametype;
    [...gameTypeToggle.children].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    formatSection.style.display = (gameType === 'singles') ? 'none' : 'block';
    gameTypeHint.textContent = (gameType === 'singles')
      ? '1v1 per court — random opponents every round.'
      : '2v2 per court — pick a format below.';

    updateRosterUI();
    resetScheduleIfAny();
  });

  formatToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;
    format = btn.dataset.format;
    [...formatToggle.children].forEach(b => b.classList.remove('active','fixed-active'));
    btn.classList.add('active');
    if(format === 'fixed') btn.classList.add('fixed-active');

    formatHint.textContent = format === 'random'
      ? 'Random partners & opponents every round.'
      : "Enter each team's two players. Partners stay locked in — only the matchups shuffle.";

    updateRosterUI();
    resetScheduleIfAny();
  });

  courtToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;
    courts = Number(btn.dataset.courts);
    [...courtToggle.children].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  // ---------- Helpers ----------
  function shuffle(arr){
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function pairKey(id1, id2){ return [String(id1), String(id2)].sort().join('|'); }
  function calcRounds(n){
    if(n <= 4) return 6;
    if(n <= 6) return 8;
    if(n <= 10) return 12;
    return 16;
  }

  function scheduleSinglesRound(allPlayers, neededSlots, courtCount, playCount, opponentHistory){
    let pool = shuffle(allPlayers);
    pool.sort((a, b) => playCount[a.id] - playCount[b.id]);
    const inPlay = pool.slice(0, neededSlots);
    const sitting = pool.slice(neededSlots);

    let best = null, bestScore = Infinity;
    for(let attempt = 0; attempt < 40; attempt++){
      const shuffledIn = shuffle(inPlay);
      const courtsArr = [];
      for(let c = 0; c < courtCount; c++) courtsArr.push([[shuffledIn[c*2]], [shuffledIn[c*2+1]]]);

      let repeats = 0;
      courtsArr.forEach(([a, b]) => { if(opponentHistory.has(pairKey(a[0].id, b[0].id))) repeats++; });

      if(repeats < bestScore){ bestScore = repeats; best = courtsArr; if(repeats === 0) break; }
    }

    best.forEach(([a, b]) => opponentHistory.add(pairKey(a[0].id, b[0].id)));
    inPlay.forEach(p => playCount[p.id]++);

    return { courts: best, sitting };
  }

  function scheduleRandomRound(allPlayers, neededSlots, courtCount, playCount, partnerHistory, opponentHistory){
    let pool = shuffle(allPlayers);
    pool.sort((a, b) => playCount[a.id] - playCount[b.id]);
    const inPlay = pool.slice(0, neededSlots);
    const sitting = pool.slice(neededSlots);

    let best = null, bestScore = Infinity;
    for(let attempt = 0; attempt < 40; attempt++){
      const shuffledIn = shuffle(inPlay);
      const teams = [];
      for(let i = 0; i < shuffledIn.length; i += 2) teams.push([shuffledIn[i], shuffledIn[i+1]]);
      const shuffledTeams = shuffle(teams);
      const courtsArr = [];
      for(let c = 0; c < courtCount; c++) courtsArr.push([shuffledTeams[c*2], shuffledTeams[c*2+1]]);

      let repeats = 0;
      teams.forEach(t => { if(partnerHistory.has(pairKey(t[0].id, t[1].id))) repeats++; });
      courtsArr.forEach(([a, b]) => { a.forEach(p1 => b.forEach(p2 => { if(opponentHistory.has(pairKey(p1.id, p2.id))) repeats++; })); });

      if(repeats < bestScore){ bestScore = repeats; best = { courtsArr, teams }; if(repeats === 0) break; }
    }

    best.teams.forEach(t => partnerHistory.add(pairKey(t[0].id, t[1].id)));
    best.courtsArr.forEach(([a, b]) => a.forEach(p1 => b.forEach(p2 => opponentHistory.add(pairKey(p1.id, p2.id)))));
    inPlay.forEach(p => playCount[p.id]++);

    return { courts: best.courtsArr, sitting };
  }

  function scheduleFixedRound(teams, courtCount, playCount, opponentHistory){
    const neededTeams = courtCount * 2;
    let pool = shuffle(teams);
    pool.sort((a, b) => playCount[a.id] - playCount[b.id]);
    const inPlay = pool.slice(0, neededTeams);
    const sitting = pool.slice(neededTeams);

    let best = null, bestScore = Infinity;
    for(let attempt = 0; attempt < 40; attempt++){
      const shuffledIn = shuffle(inPlay);
      const courtsArr = [];
      for(let c = 0; c < courtCount; c++) courtsArr.push([shuffledIn[c*2], shuffledIn[c*2+1]]);

      let repeats = 0;
      courtsArr.forEach(([a, b]) => { if(opponentHistory.has(pairKey(a.id, b.id))) repeats++; });

      if(repeats < bestScore){ bestScore = repeats; best = courtsArr; if(repeats === 0) break; }
    }

    best.forEach(([a, b]) => opponentHistory.add(pairKey(a.id, b.id)));
    inPlay.forEach(t => playCount[t.id]++);

    return {
      courts: best.map(([a, b]) => [a.players, b.players]),
      sitting: sitting.flatMap(t => t.players)
    };
  }

  function buildSchedule(){
    if(gameType === 'singles'){
      const neededSlots = courts * 2;
      if(players.length < neededSlots){
        const diff = neededSlots - players.length;
        warnText.style.display = 'block';
        warnText.textContent = `Add ${diff} more player${diff === 1 ? '' : 's'} for ${courts} court${courts > 1 ? 's' : ''}.`;
        return null;
      }
      warnText.style.display = 'none';
      const rounds = [];
      const ROUNDS = calcRounds(players.length);
      const opponentHistory = new Set();
      const playCount = {};
      players.forEach(p => playCount[p.id] = 0);
      for(let r = 0; r < ROUNDS; r++) rounds.push(scheduleSinglesRound(players, neededSlots, courts, playCount, opponentHistory));
      return { rounds };
    }

    if(format === 'fixed'){
      const neededTeams = courts * 2;
      if(teams.length < neededTeams){
        const diff = neededTeams - teams.length;
        warnText.style.display = 'block';
        warnText.textContent = `Add ${diff} more team${diff === 1 ? '' : 's'} for ${courts} court${courts > 1 ? 's' : ''}.`;
        return null;
      }
      warnText.style.display = 'none';
      const rounds = [];
      const ROUNDS = calcRounds(teams.length * 2);
      const opponentHistory = new Set();
      const playCount = {};
      teams.forEach(t => playCount[t.id] = 0);
      for(let r = 0; r < ROUNDS; r++) rounds.push(scheduleFixedRound(teams, courts, playCount, opponentHistory));
      return { rounds };
    } else {
      const neededSlots = courts * 4;
      if(players.length < neededSlots){
        const diff = neededSlots - players.length;
        warnText.style.display = 'block';
        warnText.textContent = `Add ${diff} more player${diff === 1 ? '' : 's'} for ${courts} court${courts > 1 ? 's' : ''}.`;
        return null;
      }
      warnText.style.display = 'none';
      const rounds = [];
      const ROUNDS = calcRounds(players.length);
      const opponentHistory = new Set();
      const partnerHistory = new Set();
      const playCount = {};
      players.forEach(p => playCount[p.id] = 0);
      for(let r = 0; r < ROUNDS; r++) rounds.push(scheduleRandomRound(players, neededSlots, courts, playCount, partnerHistory, opponentHistory));
      return { rounds };
    }
  }

  // ---------- Generate / Shuffle / Confirm ----------
  function handleGenerate(){
    const result = buildSchedule();
    if(!result) return;
    schedule = result.rounds;
    scores = schedule.map(round => round.courts.map(() => ({ a: null, b: null })));
    locked = false;
    showingLeaderboard = false;
    refreshView();
  }

  generateBtn.addEventListener('click', handleGenerate);
  shuffleBtn.addEventListener('click', handleGenerate);
  confirmBtn.addEventListener('click', () => { locked = true; refreshView(); });

  // ---------- Score entry ----------
  roundsContainer.addEventListener('input', (e) => {
    const t = e.target;
    if(!t.classList.contains('score-input')) return;
    const r = Number(t.dataset.r), c = Number(t.dataset.c), side = t.dataset.side;
    scores[r][c][side] = t.value === '' ? null : Math.max(0, Number(t.value));
  });

  // ---------- Rendering rounds ----------
  function renderRoundsUI(){
    roundsContainer.innerHTML = '';
    schedule.forEach((round, rIdx) => {
      const group = document.createElement('div');
      group.className = 'round-group';

      const title = document.createElement('div');
      title.className = 'round-title';
      title.textContent = 'Round ' + (rIdx + 1);
      group.appendChild(title);

      round.courts.forEach((match, cIdx) => {
        const [teamA, teamB] = match;
        const sc = scores[rIdx][cIdx];
        const inputA = locked ? `<input type="number" inputmode="numeric" min="0" class="score-input" data-r="${rIdx}" data-c="${cIdx}" data-side="a" value="${sc.a ?? ''}" placeholder="0">` : '';
        const inputB = locked ? `<input type="number" inputmode="numeric" min="0" class="score-input" data-r="${rIdx}" data-c="${cIdx}" data-side="b" value="${sc.b ?? ''}" placeholder="0">` : '';

        const card = document.createElement('div');
        card.className = 'court-card';
        card.innerHTML = `
          <div class="court-label">Court ${cIdx + 1}</div>
          <div class="matchup">
            <div class="team-col"><div class="team-name">${teamA.map(p => p.name).join(' &amp; ')}</div>${inputA}</div>
            <div class="vs">VS</div>
            <div class="team-col"><div class="team-name">${teamB.map(p => p.name).join(' &amp; ')}</div>${inputB}</div>
          </div>
        `;
        group.appendChild(card);
      });

      if(round.sitting.length){
        const note = document.createElement('div');
        note.className = 'sitting';
        note.textContent = 'Sitting out: ' + round.sitting.map(p => p.name).join(', ');
        group.appendChild(note);
      }

      roundsContainer.appendChild(group);
    });
  }

  // ---------- Leaderboard ----------
  function getAllPlayersFlat(){
    return (gameType === 'doubles' && format === 'fixed') ? teams.flatMap(t => t.players) : players;
  }

  function computeLeaderboard(){
    const totals = {};
    getAllPlayersFlat().forEach(p => totals[p.id] = { name: p.name, points: 0, played: 0 });
    schedule.forEach((round, rIdx) => {
      round.courts.forEach((match, cIdx) => {
        const sc = scores[rIdx][cIdx];
        if(sc.a == null && sc.b == null) return;
        const a = sc.a ?? 0, b = sc.b ?? 0;
        match[0].forEach(p => { totals[p.id].points += a; totals[p.id].played += 1; });
        match[1].forEach(p => { totals[p.id].points += b; totals[p.id].played += 1; });
      });
    });
    return Object.values(totals).sort((x, y) => y.points - x.points || x.name.localeCompare(y.name));
  }

  function renderLeaderboard(){
    const rows = computeLeaderboard();
    leaderboardList.innerHTML = rows.map((r, i) => {
      const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
      return `
        <div class="leaderboard-row ${rankClass}">
          <div class="lb-rank">${i + 1}</div>
          <div class="lb-name">
            <div class="nm">${r.name}</div>
            <div class="meta">${r.played} match${r.played === 1 ? '' : 'es'} played</div>
          </div>
          <div class="lb-points">${r.points}<span class="unit"> pts</span></div>
        </div>
      `;
    }).join('');
  }

  viewLeaderboardBtn.addEventListener('click', () => { showingLeaderboard = true; refreshView(); });
  backToMatchesBtn.addEventListener('click', () => { showingLeaderboard = false; refreshView(); });

  startOverBtn.addEventListener('click', () => {
    schedule = null;
    scores = null;
    locked = false;
    showingLeaderboard = false;
    refreshView();
  });

  // ---------- Share / Save as image ----------
  shareBtn.addEventListener('click', async () => {
    if(typeof html2canvas === 'undefined'){
      alert('Could not load the image tool — check your connection, or just screenshot the leaderboard instead.');
      return;
    }
    const node = document.getElementById('leaderboardCard');
    try{
      const canvas = await html2canvas(node, { backgroundColor: '#163B2C', scale: 2 });
      canvas.toBlob(async (blob) => {
        if(!blob) return;
        const file = new File([blob], 'tennis-leaderboard.png', { type: 'image/png' });
        if(navigator.canShare && navigator.canShare({ files: [file] })){
          try{
            await navigator.share({ files: [file], title: 'Tennis Leaderboard' });
            return;
          }catch(err){
            if(err.name === 'AbortError') return;
          }
        }
        const url = URL.createObjectURL(blob);
        const win = window.open(url, '_blank');
        if(!win){
          const a = document.createElement('a');
          a.href = url; a.download = 'tennis-leaderboard.png'; a.click();
        }
      }, 'image/png');
    }catch(err){
      alert('Something went wrong saving the image — you can still screenshot the leaderboard.');
    }
  });

  // ---------- Lock setup while playing ----------
  function setLocked(isLocked){
    [...gameTypeToggle.querySelectorAll('button')].forEach(b => b.disabled = isLocked);
    [...formatToggle.querySelectorAll('button')].forEach(b => b.disabled = isLocked);
    [...courtToggle.querySelectorAll('button')].forEach(b => b.disabled = isLocked);
    playerInput.disabled = isLocked;
    addBtn.disabled = isLocked;
    teamP1Input.disabled = isLocked;
    teamP2Input.disabled = isLocked;
    addTeamBtn.disabled = isLocked;
    document.querySelectorAll('.remove-btn').forEach(b => b.disabled = isLocked);
    gameTypeToggle.classList.toggle('disabled-zone', isLocked);
    formatToggle.classList.toggle('disabled-zone', isLocked);
    courtToggle.classList.toggle('disabled-zone', isLocked);
    playerCard.classList.toggle('disabled-zone', isLocked);
  }

  // ---------- Master view refresh ----------
  function refreshView(){
    setLocked(locked);
    generateBtn.style.display = schedule ? 'none' : 'block';
    resultsEl.style.display = schedule ? 'block' : 'none';
    if(!schedule) return;

    previewActions.style.display = (!locked) ? 'flex' : 'none';
    viewLeaderboardBtn.style.display = (locked && !showingLeaderboard) ? 'block' : 'none';
    roundsContainer.style.display = showingLeaderboard ? 'none' : 'block';
    leaderboardSection.style.display = (locked && showingLeaderboard) ? 'block' : 'none';

    if(!showingLeaderboard) renderRoundsUI();
    else renderLeaderboard();
  }

  renderPlayers(null);
</script>
</body>
</html>
